<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>文化祭競馬 管理</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell admin-shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">Operator Console</p>
          <h1>管理画面</h1>
        </div>
        <a class="admin-link" href="./index.html">参加者画面</a>
      </section>

      <p id="setupWarning" class="warning" hidden>Firebase設定がまだ入っていません。READMEの手順で設定してください。</p>

      <section class="control-panel">
        <div>
          <p class="eyebrow">Race State</p>
          <h2>現在: <span id="status">waiting</span></h2>
        </div>
        <div class="button-row">
          <button id="startRace" type="button">レース開始</button>
          <button id="finishRace" type="button">結果確定・配当</button>
          <button id="resetRace" type="button">待機に戻す</button>
        </div>
      </section>

      <section class="control-panel">
        <div>
          <p class="eyebrow">Point Grant</p>
          <h2>ポイント付与</h2>
        </div>
        <div class="grant-form">
          <input id="grantPlayerId" placeholder="参加者ID">
          <input id="grantAmount" type="number" step="1" placeholder="付与ポイント">
          <button id="grantPoints" type="button">送る</button>
        </div>
      </section>

      <section class="table-panel">
        <div>
          <p class="eyebrow">Players</p>
          <h2>参加者一覧</h2>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>名前</th>
                <th>残高</th>
                <th>選択</th>
                <th>使用</th>
                <th>結果</th>
              </tr>
            </thead>
            <tbody id="players"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script type="module" src="./src/admin.js"></script>
  </body>
</html>
