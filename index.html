<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>文化祭競馬</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">Cultural Festival Derby</p>
          <h1>文化祭競馬</h1>
        </div>
        <a class="admin-link" href="./admin.html">管理</a>
      </section>

      <p id="setupWarning" class="warning" hidden>Firebase設定がまだ入っていません。管理者に確認してください。</p>

      <section class="player-panel">
        <div>
          <label for="playerName">名前</label>
          <div class="inline-form">
            <input id="playerName" autocomplete="nickname" placeholder="名前を入力">
            <button id="saveName" type="button">登録</button>
          </div>
          <small>端末ID: <span id="playerId"></span></small>
        </div>
        <div class="balance-box">
          <span>応援ポイント</span>
          <strong id="balance">0</strong>
        </div>
      </section>

      <section class="bet-panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Prediction</p>
            <h2>応援する馬を選ぶ</h2>
          </div>
          <label class="stake-label" for="stake">
            ポイント
            <input id="stake" type="number" min="1" step="1" value="10">
          </label>
        </div>
        <div id="horses" class="horse-grid"></div>
      </section>

      <section class="race-panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Race</p>
            <h2 id="raceStatus">次のレースを待っています</h2>
          </div>
          <p id="commentary" class="commentary">馬を選んで応援ポイントを入れてください。</p>
        </div>
        <div id="track" class="track" aria-live="polite"></div>
      </section>

      <section class="result-panel">
        <p class="eyebrow">Result</p>
        <h2>着順</h2>
        <ol id="standings" class="standings"></ol>
      </section>
    </main>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
